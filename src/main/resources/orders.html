<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(120deg, #2c3e50, #4ca1af);
            padding: 30px;
            color: white;
        }

        h1 {
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: orange;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: darkorange;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255,255,255,0.2);
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        li button {
            width: auto;
            margin-left: 5px;
            background: red;
        }
    </style>
</head>

<body>

<div class="container">

<h1>Create Order</h1>

<input id="clientName" placeholder="Client Name">
<input id="plates" placeholder="Plates (ex: pizza,pasta)">
<input id="total" placeholder="Total">

<button onclick="createOrder()">Create</button>

<h2>Order List</h2>
<ul id="list"></ul>

</div>

<script>

async function createOrder() {
    const clientName = document.getElementById("clientName").value;
    const plates = document.getElementById("plates").value.split(",");
    const total = parseFloat(document.getElementById("total").value);

    await fetch("/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            clientName: clientName,
            plates: plates,
            total: total
        })
    });

    loadOrders();
}

async function loadOrders() {
    const res = await fetch("/orders");
    const data = await res.json();

    const list = document.getElementById("list");
    lista.innerHTML = "";

    data.forEach(p => {
        const li = document.createElement("li");

        li.textContent =
            "Client: " + p.clientName +
            " | Plates: " + p.plates.join(", ") +
            " | Total: " + p.total + "€ ";

        // ✏️ EDITAR
        const btnEdit = document.createElement("button");
        btnEdit.textContent = "Edit";
        btnEdit.onclick = async () => {
            const newClient = prompt("New client name:", p.clientName);
            const newPlates = prompt("New plates (ej: pizza,pasta):", p.plates.join(","));
            const newTotal = prompt("New total:", p.total);

            if (newClient !== null && newPlates !== null && newTotal !== null) {
                await fetch("/orders/" + p.id, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        clientName: newClient,
                        plates: newPlates.split(","),
                        total: parseFloat(newTotal)
                    })
                });

                loadOrders();
            }
        };
        const btnDelete = document.createElement("button");
        btnDelete.textContent = "Delete";
        btnDelete.onclick = async () => {
            await fetch("/orders/" + p.id, {
                method: "DELETE"
            });
            loadOrders();
        };

        li.appendChild(btnEdit);
        li.appendChild(btnDelete);
        lista.appendChild(li);
    });
}

loadOrders();

</script>

</body>
</html>
