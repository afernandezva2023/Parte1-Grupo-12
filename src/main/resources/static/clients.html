<!DOCTYPE html>
<html>
<head>
    <title>Clients</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
            color: white;
        }

        h1, h2 {
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        input {
            width: 45%;
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .create-btn {
            background: #00c853;
            color: white;
        }

        .edit-btn {
            background: #ffab00;
            color: black;
        }

        .delete-btn {
            background: #d50000;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255,255,255,0.2);
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info {
            flex: 1;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Clients</h1>

    <h2>Create Client</h2>

    <input id="name" placeholder="Nombre">
    <input id="email" placeholder="Email">
    <button class="create-btn" onclick="createClient()">Create</button>

    <h2>Clients List</h2>
    <ul id="list"></ul>

</div>

<script>

async function createClient() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;

    await fetch("/clientes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre: name, email: email })
    });

    loadClients();
}

async function loadClients() {
    const res = await fetch("/clientes");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(c => {

        const li = document.createElement("li");

        const info = document.createElement("div");
        info.className = "info";
        info.textContent = c.nombre + " - " + c.email;

        // BOTÓN EDITAR
        const btnEdit = document.createElement("button");
        btnEdit.textContent = "Editar";
        btnEdit.className = "edit-btn";

        btnEdit.onclick = async () => {
            const newName = prompt("Nuevo nombre:", c.nombre);
            const newEmail = prompt("Nuevo email:", c.email);

            await fetch("/clientes/" + c.id, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    nombre: newName,
                    email: newEmail
                })
            });

            loadClients();
        };

        // BOTÓN BORRAR
        const btnDelete = document.createElement("button");
        btnDelete.textContent = "Borrar";
        btnDelete.className = "delete-btn";

        btnDelete.onclick = async () => {
            await fetch("/clientes/" + c.id, { method: "DELETE" });
            loadClients();
        };

        li.appendChild(info);
        li.appendChild(btnEdit);
        li.appendChild(btnDelete);

        list.appendChild(li);
    });
}

loadClients();

</script>

</body>
</html>
