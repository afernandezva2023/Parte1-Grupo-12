<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Plates</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #28a745, #218838);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: linear-gradient(135deg, #218838, #1e7e34);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #fff;
            margin-top: 10px;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }

        li button {
            width: auto;
            background: #dc3545;
            padding: 5px 10px;
            font-size: 12px;
        }

        li button:hover {
            background: #c82333;
        }
</style>
</head>
<body>
<div class="container">

<h1>Create Plate</h1>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<button onclick="createPlate()">Create</button>

<h2>List of Plates</h2>
<ul id="lista"></ul>

<script>
async function createPlate() {
    const name = document.getElementById("nombre").value;
    const price = parseFloat(document.getElementById("precio").value);

    await fetch("/platos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ nombre, precio })
    });

    cargarPlatos();
}

async function chargePlates() {
    const res = await fetch("/platos");
    const data = await res.json();

    const list = document.getElementById("lista");
    listainnerHTML = "";

    data.forEach(p => {
    const li = document.createElement("li");

    li.textContent = p.nombre + " - " + p.precio + "€ ";

    
    const btnEdit = document.createElement("button");
    btnEdit.textContent = "Editar";
    btnEdit.onclick = async () => {
        const newName = prompt("Nuevo nombre:", p.nombre);
        const newPrice = prompt("Nuevo precio:", p.precio);

        if (newName !== null && newPrice !== null) {
            await fetch("/platos/" + p.id, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    nombre: newName,
                    precio: parseFloat(newPrice)
                })
            });

            chargePlates();
        }
    };

        const btn = document.createElement("button");
        btn.textContent = "Borrar";
        btn.onclick = async () => {
                await fetch("/platos/" + p.id, {
                method: "DELETE"
            });
            cargarPlatos();
        };

        li.appendChild(btnEdit);
        li.appendChild(btn);
        lista.appendChild(li);
    });
}

cargarPlatos();
</script>

</div>
</body>
</html>
