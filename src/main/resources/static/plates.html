<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">  
    <title>Plates</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            margin: 0;
            padding: 20px;
            color: white;
        }

        h1, h2 {
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }

        input {
            width: 45%;
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .create-btn {
            background: #00c853;
            color: white;
        }

        .edit-btn {
            background: #ffab00;
            color: black;
        }

        .delete-btn {
            background: #d50000;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: rgba(255,255,255,0.2);
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info {
            flex: 1;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Plates</h1>

    <h2>Create Plate</h2>

    <input id="name" placeholder="Name">
    <input id="price" placeholder="Price">
    <button class="create-btn" onclick="createPlate()">Create</button>

    <h2>Plates List</h2>
    <ul id="list"></ul>

</div>

<script>

async function createPlate() {
    const name = document.getElementById("name").value;
    const price = parseFloat(document.getElementById("price").value);

    await fetch("/plates", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: name, price: price })
    });

    loadPlates();
}

async function loadPlates() {
    const res = await fetch("/plates");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.forEach(p => {

        const li = document.createElement("li");

        const info = document.createElement("div");
        info.className = "info";
        info.textContent = p.name + " - " + p.price + "€";

        // EDITAR
        const btnEdit = document.createElement("button");
        btnEdit.textContent = "Editar";
        btnEdit.className = "edit-btn";

        btnEdit.onclick = async () => {
            const newName = prompt("Nuevo nombre:", p.name);
            const newPrice = prompt("Nuevo precio:", p.price);

            await fetch("/plates/" + p.id, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: newName,
                    price: parseFloat(newPrice)
                })
            });

            loadPlates();
        };

        // BORRAR
        const btnDelete = document.createElement("button");
        btnDelete.textContent = "Borrar";
        btnDelete.className = "delete-btn";

        btnDelete.onclick = async () => {
            await fetch("/plates/" + p.id, { method: "DELETE" });
            loadPlates();
        };

        li.appendChild(info);
        li.appendChild(btnEdit);
        li.appendChild(btnDelete);

        list.appendChild(li);
    });
}

loadPlates();

</script>

</body>
</html>
